<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tagmate</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    #tm-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      background: linear-gradient(145deg, #0f172a 0%, #1e1b4b 60%, #0f172a 100%);
      opacity: 1;
      transition: opacity 0.45s ease;
    }
    #tm-splash.hiding { opacity: 0; pointer-events: none; }

    .tm-splash-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: tmSplashRise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes tmSplashRise {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .tm-splash-logo {
      width: 72px;
      height: 72px;
      filter: brightness(0) invert(1);
      animation: tmSplashPulse 2s ease-in-out infinite;
    }
    @keyframes tmSplashPulse {
      0%,100% { transform: scale(1);    opacity: 1;    }
      50%     { transform: scale(1.07); opacity: 0.82; }
    }

    .tm-splash-wordmark {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      font-family: 'Inter', sans-serif;
    }
    .tm-splash-tagline {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.42);
      letter-spacing: 0.4px;
    }

    .tm-splash-dots {
      display: flex;
      gap: 8px;
      animation: tmSplashRise 0.55s 0.18s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .tm-splash-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: tmDotBounce 1.2s ease-in-out infinite;
    }
    .tm-splash-dot:nth-child(2) { animation-delay: 0.15s; }
    .tm-splash-dot:nth-child(3) { animation-delay: 0.3s;  }
    @keyframes tmDotBounce {
      0%,80%,100% { transform: scale(1);   background: rgba(255,255,255,0.3); }
      40%         { transform: scale(1.5); background: #6366f1; }
    }
  </style>
</head>
<body>
  <!-- Splash shown before Angular boots; removed by AppComponent after prefetch window -->
  <div id="tm-splash" aria-hidden="true">
    <div class="tm-splash-body">
      <img src="assets/tagmate-logo.svg" alt="" class="tm-splash-logo" width="72" height="72">
      <span class="tm-splash-wordmark">tagmate</span>
      <span class="tm-splash-tagline">your neighbourhood, live</span>
    </div>
    <div class="tm-splash-dots">
      <span class="tm-splash-dot"></span>
      <span class="tm-splash-dot"></span>
      <span class="tm-splash-dot"></span>
    </div>
  </div>

  <app-root></app-root>
</body>
</html>
