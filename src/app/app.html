@if (!network.isOnline()) {
  <div class="fixed top-0 left-0 right-0 z-[10001] bg-red-500 text-white text-center py-1 text-sm font-semibold">
    You are currently offline.
  </div>
}

<div class="main-container" [class.with-nav]="showNav()">
  <router-outlet></router-outlet>
</div>

@if (showNav()) {
  <button
    class="tm-icon-btn fixed bottom-20 right-4 md:top-4 md:right-4 md:bottom-auto z-[9999] shadow-lg"
    type="button"
    (click)="theme.toggleTheme()"
    aria-label="Toggle theme"
  >
    <i
      class="bi"
      [ngClass]="{
        'bi-sun-fill': theme.currentTheme() === 'light',
        'bi-moon-fill': theme.currentTheme() === 'dark',
        'bi-moon-stars-fill': theme.currentTheme() === 'midnight',
        'bi-tree-fill': theme.currentTheme() === 'forest',
        'bi-cup-hot-fill': theme.currentTheme() === 'sepia'
      }"
    ></i>
  </button>
}

@if (toast.message(); as message) {
  <div
    class="app-toast fixed left-1/2 z-[10000] flex w-[min(420px,calc(100%_-_32px))] -translate-x-1/2 items-center gap-3 rounded-tm border border-l-4 border-white/70 bg-white/90 px-3.5 py-3 text-tm-text shadow-tm-lg backdrop-blur-[18px]"
    [ngClass]="'app-toast-' + message.tone"
    role="status"
    aria-live="polite"
  >
    <span class="flex-1 text-[13px] font-semibold leading-snug">{{ message.text }}</span>
    <button
      type="button"
      class="toast-close grid size-7 place-items-center rounded-full border-0 bg-transparent text-tm-muted transition hover:bg-slate-900/10 hover:text-tm-text"
      aria-label="Dismiss notification"
      (click)="toast.dismiss()"
    >
      <i class="bi bi-x-lg" aria-hidden="true"></i>
    </button>
  </div>
}

@if (showNav()) {
  <app-nav />
}

<app-confirm-dialog />
