<div class="login-page">
  <div class="login-content">

    <!-- Brand -->
    <div class="brand-block">
      <div class="brand-logo">
        <i class="bi bi-geo-alt-fill"></i>
      </div>
      <h1 class="brand-name">Tagmate</h1>
      <p class="brand-tagline">Your neighborhood, in real time.</p>
    </div>

    <!-- Card -->
    <div class="login-card">
      <div class="login-fields">
        <input
          type="text"
          class="tm-input"
          placeholder="Email address"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          [disabled]="loading()"
          autocomplete="email"
        />
        <input
          type="password"
          class="tm-input"
          placeholder="Password"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          [disabled]="loading()"
          autocomplete="current-password"
        />

        <button class="tm-btn tm-btn-primary w-full" [disabled]="loading()" (click)="login()">
          @if (!loading()) { Log In }
          @else {
            <span class="size-4 animate-spin rounded-full border-2 border-white/40 border-t-white"></span>
            Signing in...
          }
        </button>
      </div>

      <div class="divider">OR</div>

      <button
        class="guest-btn"
        [disabled]="loading()"
        (click)="loginGuest()"
      >
        @if (!loading()) {
          <i class="bi bi-incognito"></i>
          Continue as Guest
        } @else {
          <span class="size-4 animate-spin rounded-full border-2 border-slate-300 border-t-slate-700"></span>
          Please wait...
        }
      </button>

      @if (error()) {
        <div class="error-msg">
          <i class="bi bi-exclamation-circle"></i> {{ error() }}
        </div>
      }
    </div>

    <p class="signup-hint">
      Don't have an account? <span class="text-tm-primary font-semibold">Sign up soon</span>
    </p>

  </div>
</div>
