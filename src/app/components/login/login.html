<div class="login-wrapper d-flex justify-content-center align-items-center">
  <div class="login-card p-4">

    <h1 class="brand text-center mb-4">Tag -_-</h1>

    <!-- LOGIN FORM -->
    <div class="w-100 mb-3">

      <input
        type="text"
        class="form-control mb-2"
        placeholder="Phone number, username, or email"
        [value]="email()"
        (input)="email.set($any($event.target).value)"
        [disabled]="loading()"
      />

      <input
        type="password"
        class="form-control mb-3"
        placeholder="Password"
        [value]="password()"
        (input)="password.set($any($event.target).value)"
        [disabled]="loading()"
      />

      <button
        class="btn btn-primary w-100 mb-3 d-flex justify-content-center align-items-center"
        [disabled]="loading()"
        (click)="login()"
      >
        <ng-container *ngIf="!loading(); else loaderTpl">
          Log In
        </ng-container>
      </button>

      <ng-template #loaderTpl>
        <span class="spinner-border spinner-border-sm"></span>
        <span class="ms-2">Loading...</span>
      </ng-template>

    </div>

    <div class="divider text-center">OR</div>

    <!-- GUEST MODE -->
    <button
      class="btn btn-dark w-100 mt-3 d-flex justify-content-center align-items-center"
      [disabled]="loading()"
      (click)="loginGuest()"
    >
      <ng-container *ngIf="!loading(); else loaderTpl2">
        Continue as Guest
      </ng-container>
    </button>

    <ng-template #loaderTpl2>
      <span class="spinner-border spinner-border-sm"></span>
      <span class="ms-2">Please wait...</span>
    </ng-template>

    <div class="text-danger text-center mt-2" *ngIf="error()">
      {{ error() }}
    </div>

  </div>

  <div class="signup-box text-center mt-3 p-3">
    Don't have an account?
    <a routerLink="/signup" class="text-primary fw-bold">Sign up</a>
  </div>
</div>
