<nav class="topbar flex items-center justify-end gap-2 px-3">
  <button
    class="tm-icon-btn border-tm-primary bg-tm-primary text-white hover:border-tm-primary-hover hover:bg-tm-primary-hover hover:text-white"
    type="button"
    aria-label="Notifications"
    (click)="onNotifyClick()"
  >
    <i class="bi bi-bell" aria-hidden="true"></i>
  </button>

  <button class="tm-btn tm-btn-primary" type="button" (click)="onAddPost()">
    <i class="bi bi-plus-lg" aria-hidden="true"></i>
    Create Post
  </button>

  <div *ngIf="(auth.user$ | async) as user">
    <button
      *ngIf="user.uid === 'guest'"
      class="tm-btn tm-btn-primary"
      type="button"
      (click)="signIn()"
    >
      Sign In
    </button>

    <button
      *ngIf="user.uid !== 'guest'"
      class="tm-btn tm-btn-danger"
      type="button"
      (click)="auth.logout()"
    >
      Logout
    </button>
  </div>
</nav>
