@if (dialog.state(); as s) {
  <div class="confirm-backdrop" (click)="dialog.respond(false)">
    <div
      class="confirm-card"
      role="alertdialog"
      aria-modal="true"
      [attr.aria-label]="s.title"
      (click)="$event.stopPropagation()"
    >
      <h3 class="confirm-title">{{ s.title }}</h3>
      <p class="confirm-message">{{ s.message }}</p>
      <div class="confirm-actions">
        <button
          type="button"
          class="confirm-btn confirm-btn--cancel"
          autofocus
          (click)="dialog.respond(false)"
        >
          {{ s.cancelText }}
        </button>
        <button
          type="button"
          class="confirm-btn"
          [class.confirm-btn--danger]="s.danger"
          [class.confirm-btn--primary]="!s.danger"
          (click)="dialog.respond(true)"
        >
          {{ s.confirmText }}
        </button>
      </div>
    </div>
  </div>
}
