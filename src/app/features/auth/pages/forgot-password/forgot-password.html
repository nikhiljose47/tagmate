<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Forgot Password</h1>
      <p class="auth-sub">Enter your email and we'll send you a password reset link.</p>
    </div>

    @if (success()) {
      <div class="success-state">
        <div class="success-icon">✉️</div>
        <h3>Check your email</h3>
        <p class="mb-4">We sent a password recovery link to <strong>{{ email() }}</strong>.</p>
        <a routerLink="/login" class="tm-btn tm-btn-primary w-full text-center block text-decoration-none">Back to Login</a>
      </div>
    }

    @if (!success()) {
      <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" class="auth-form">
        @if (error()) {
          <div class="tm-alert tm-alert-danger mb-3">{{ error() }}</div>
        }

        <div class="field-block">
          <label class="edit-label">Email Address</label>
          <input
            name="email"
            class="tm-input"
            type="email"
            placeholder="name@example.com"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            required
            autocomplete="email"
          />
        </div>

        <button
          type="submit"
          class="tm-btn tm-btn-primary w-full submit-btn"
          [disabled]="loading() || !email().trim()"
        >
          @if (loading()) {
            Sending...
          } @else {
            Send Reset Link
          }
        </button>

        <p class="auth-footer mt-4">
          Remember your password? <a routerLink="/login" class="text-tm-primary font-semibold">Log in</a>
        </p>
      </form>
    }
  </div>
</div>
