<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Update Password</h1>
      <p class="auth-sub">Enter your new password below.</p>
    </div>

    <form (ngSubmit)="onSubmit()" #updateForm="ngForm" class="auth-form">
      @if (error()) {
        <div class="tm-alert tm-alert-danger mb-3">{{ error() }}</div>
      }

      <div class="field-block">
        <label class="edit-label">New Password</label>
        <input
          name="password"
          class="tm-input"
          type="password"
          placeholder="Min 6 characters"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          required
          autocomplete="new-password"
        />
      </div>

      <button
        type="submit"
        class="tm-btn tm-btn-primary w-full submit-btn"
        [disabled]="loading() || password().length < 6"
      >
        @if (loading()) {
          Updating...
        } @else {
          Update Password
        }
      </button>
    </form>
  </div>
</div>
